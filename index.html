<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia Institucional</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: #1e3a8a;
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 5px 0 0 0; font-size: 16px; opacity: 0.9; }
        .contenedor {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        #lector-qr {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #f8fafc;
        }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .exito { background-color: #d1fae5; color: #065f46; border: 2px solid #34d399; }
        .tardanza { background-color: #ffedd5; color: #9a3412; border: 2px solid #fb923c; }
        .error { background-color: #fee2e2; color: #991b1b; border: 2px solid #f87171; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA DE ASISTENCIA DIGITAL</h1>
        <p>Muestre su código QR frente a la cámara</p>
    </div>

    <div class="contenedor">
        <div id="lector-qr"></div>
        <div id="resultado"></div>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const urlGoogleSheets = "https://script.google.com/macros/s/AKfycbxIRc10hEWQJQIiSMags-uP2BX-d8HncnI9HqsdHWZaC9QtPiFsR9M7w82_F6LRiwVAZA/exec";

        let escaneoBloqueado = false;

        // FUNCIÓN TÉCNICA PARA GENERAR PITIDOS ELECTRÓNICOS SIN AUDIO EXTERNO
        function emitirPitido(frecuencia, duracion) {
            try {
                const contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
                const oscilador = contextoAudio.createOscillator();
                const ganancia = contextoAudio.createGain();
                
                oscilador.type = "sine";
                oscilador.frequency.value = frecuencia; // Frecuencia en Hz
                ganancia.gain.setValueAtTime(0.3, contextoAudio.currentTime); // Volumen al 30%
                
                oscilador.connect(ganancia);
                ganancia.connect(contextoAudio.destination);
                
                oscilador.start();
                // Efecto de apagado suave para evitar chasquidos en el parlante
                ganancia.gain.exponentialRampToValueAtTime(0.00001, contextoAudio.currentTime + duracion);
                oscilador.stop(contextoAudio.currentTime + duracion);
            } catch (error) {
                console.error("Error al emitir sonido:", error);
            }
        }

        function inicializarEscaner() {
            const html5QrcodeScanner = new Html5QrcodeScanner("lector-qr", { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true
            });
            
            html5QrcodeScanner.render(onScanSuccess);
        }

        function onScanSuccess(decodedText) {
            if (escaneoBloqueado) return;
            escaneoBloqueado = true; // Bloqueo momentáneo para procesar el pitido

            const cuadroResultados = document.getElementById('resultado');
            cuadroResultados.style.display = "block";
            cuadroResultados.className = "exito"; 
            cuadroResultados.innerHTML = "✅ ¡REGISTRO ENVIADO!<br><small>DNI: " + decodedText + "</small>";
            document.body.style.backgroundColor = "#d1fae5";

            // 1. Mandamos los datos a Google en segundo plano (vuela)
            fetch(urlGoogleSheets, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ codigo: decodedText })
            }).catch(error => console.log("Error de red de respaldo:", error));

            // 2. Emitimos el pitido de supermercado al instante
            emitirPitido(800, 0.12);

            // 3. EL TRUCO: En solo 800 milisegundos limpiamos la pantalla y SOLTAMOS el escáner
            setTimeout(() => {
                cuadroResultados.style.display = "none";
                document.body.style.backgroundColor = "#f3f4f6";
                escaneoBloqueado = false; // ¡Cámara liberada para el siguiente alumno!
            }, 800); 
        }
            .then(() => {
                // COMO USAMOS 'NO-CORS', EL MENSAJE LLEGA SÍ O SÍ A GOOGLE. 
                // EN LUGAR DE ESPERAR LA RESPUESTA LENTA, HACEMOS UN PITIDO INSTANTÁNEO DE ÉXITO
                
                cuadroResultados.className = "exito";
                cuadroResultados.innerHTML = "✅ ¡REGISTRO ENVIADO!<br><small>DNI: " + decodedText + "</small>";
                document.body.style.backgroundColor = "#d1fae5";
                
                // Sonido tipo supermercado: Pitido agudo (800Hz) y muy corto (0.15 segundos)
                emitirPitido(800, 0.15);

                // Desbloqueamos el escáner en solo 1.5 segundos para que la fila vuele
                setTimeout(() => {
                    cuadroResultados.style.display = "none";
                    document.body.style.backgroundColor = "#f3f4f6";
                    escaneoBloqueado = false;
                }, 1500);
            })
            .catch(error => {
                cuadroResultados.className = "error";
                cuadroResultados.innerHTML = "❌ Error de Red / Conexión";
                document.body.style.backgroundColor = "#fee2e2";
                
                // Sonido de error: Dos pitidos graves seguidos (Dos tonos de 300Hz cortos)
                emitirPitido(300, 0.2);
                setTimeout(() => emitirPitido(300, 0.2), 250);

                setTimeout(() => {
                    cuadroResultados.style.display = "none";
                    document.body.style.backgroundColor = "#f3f4f6";
                    escaneoBloqueado = false;
                }, 3000);
            });
        }

        window.addEventListener('DOMContentLoaded', inicializarEscaner);
    </script>
</body>
</html>
