<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia Institucional</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: #1e3a8a;
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 5px 0 0 0; font-size: 16px; opacity: 0.9; }
        .contenedor {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        #lector-qr {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #f8fafc;
        }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .exito { background-color: #d1fae5; color: #065f46; border: 2px solid #34d399; }
        .advertencia { background-color: #fef3c7; color: #92400e; border: 2px solid #fbbf24; }
        .error { background-color: #fee2e2; color: #991b1b; border: 2px solid #f87171; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA DE ASISTENCIA DIGITAL</h1>
        <p>Muestre su código QR frente a la cámara</p>
    </div>

    <div class="contenedor">
        <div id="lector-qr"></div>
        <div id="resultado"></div>
    </div>

    <script>
        const urlGoogleSheets = "https://script.google.com/macros/s/AKfycbxIRc10hEWQJQIiSMags-uP2BX-d8HncnI9HqsdHWZaC9QtPiFsR9M7w82_F6LRiwVAZA/exec";

        let escaneoBloqueado = false;
        
        // LISTA LOCAL: Aquí la tablet guardará los DNI procesados durante la mañana
        let alumnosProcesadosHoy = new Set();

        // Generador de sonidos limpios
        function emitirPitido(frecuencia, duracion) {
            try {
                const contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
                const oscilador = contextoAudio.createOscillator();
                const ganancia = contextoAudio.createGain();
                oscilador.type = "sine";
                oscilador.frequency.value = frecuencia; 
                ganancia.gain.setValueAtTime(0.3, contextoAudio.currentTime); 
                oscilador.connect(ganancia);
                ganancia.connect(contextoAudio.destination);
                oscilador.start();
                ganancia.gain.exponentialRampToValueAtTime(0.00001, contextoAudio.currentTime + duracion);
                oscilador.stop(contextoAudio.currentTime + duracion);
            } catch (e) { console.log(e); }
        }

        function inicializarEscaner() {
            const html5QrcodeScanner = new Html5QrcodeScanner("lector-qr", { 
                fps: 20, // Más cuadros por segundo para lectura ultra veloz
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true
            });
            html5QrcodeScanner.render(onScanSuccess);
        }

        function onScanSuccess(decodedText) {
            if (escaneoBloqueado) return;
            escaneoBloqueado = true; 

            const DNI = decodedText.trim();
            const cuadroResultados = document.getElementById('resultado');
            cuadroResultados.style.display = "block";

            // 1. CONTROL DE DUPLICADOS EN TIEMPO REAL (MEMORIA LOCAL)
            if (alumnosProcesadosHoy.has(DNI)) {
                // Alumno tramposo detectado localmente de inmediato
                cuadroResultados.className = "advertencia";
                cuadroResultados.innerHTML = "⚠️ ASISTENCIA YA REGISTRADA<br><small>El DNI " + DNI + " ya ingresó hoy.</small>";
                document.body.style.backgroundColor = "#fef3c7";

                // Pitido doble grave de advertencia (Bup-Bup)
                emitirPitido(350, 0.15);
                setTimeout(() => emitirPitido(350, 0.15), 200);

                // Liberamos la cámara rápido (en 1 segundo) para no trabar la fila
                setTimeout(() => {
                    cuadroResultados.style.display = "none";
                    document.body.style.backgroundColor = "#f3f4f6";
                    escaneoBloqueado = false;
                }, 1000);
                return; // Corta el proceso aquí, no consume internet ni envía nada a Google
            }

            // 2. CASO: ALUMNO NUEVO (INGRESO CORRECTO)
            // Lo guardamos de inmediato en la memoria de la tablet
            alumnosProcesadosHoy.add(DNI);

            cuadroResultados.className = "exito"; 
            cuadroResultados.innerHTML = "✅ ¡INGRESO REGISTRADO!<br><small>DNI: " + DNI + "</small>";
            document.body.style.backgroundColor = "#d1fae5";

            // Manda el dato a Google Sheets de fondo (no frena la pantalla)
            fetch(urlGoogleSheets, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ codigo: DNI })
            }).catch(error => console.log("Envío de respaldo:", error));

            // Pitido agudo instantáneo tipo supermercado (Bip!)
            emitirPitido(800, 0.12);

            // En solo 800 milisegundos limpia la pantalla y suelta la cámara
            setTimeout(() => {
                cuadroResultados.style.display = "none";
                document.body.style.backgroundColor = "#f3f4f6";
                escaneoBloqueado = false; 
            }, 800);
        }

        window.onload = inicializarEscaner;
    </script>
</body>
</html>
