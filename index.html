<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia Institucional</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background-color: #1e3a8a;
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 5px 0 0 0; font-size: 16px; opacity: 0.9; }
        .contenedor {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        #lector-qr {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            background-color: #f8fafc;
        }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }
        .exito { background-color: #d1fae5; color: #065f46; border: 2px solid #34d399; }
        .error { background-color: #fee2e2; color: #991b1b; border: 2px solid #f87171; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA DE ASISTENCIA DIGITAL</h1>
        <p>Muestre su código QR frente a la cámara</p>
    </div>

    <div class="contenedor">
        <div id="lector-qr"></div>
        <div id="resultado"></div>
    </div>

    <script>
        // TU URL DE GOOGLE APPS SCRIPT
        const urlGoogleSheets = "https://script.google.com/macros/s/AKfycbxIRc10hEWQJQIiSMags-uP2BX-d8HncnI9HqsdHWZaC9QtPiFsR9M7w82_F6LRiwVAZA/exec";

        let escaneoBloqueado = false;

        // FUNCIÓN PARA GENERAR PITIDOS ELECTRÓNICOS
        function emitirPitido(frecuencia, duracion) {
            try {
                const contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
                const oscilador = contextoAudio.createOscillator();
                const ganancia = contextoAudio.createGain();
                
                oscilador.type = "sine";
                oscilador.frequency.value = frecuencia; 
                ganancia.gain.setValueAtTime(0.3, contextoAudio.currentTime); 
                
                oscilador.connect(ganancia);
                ganancia.connect(contextoAudio.destination);
                
                oscilador.start();
                ganancia.gain.exponentialRampToValueAtTime(0.00001, contextoAudio.currentTime + duracion);
                oscilador.stop(contextoAudio.currentTime + duracion);
            } catch (error) {
                console.error("Error al emitir sonido:", error);
            }
        }

        function inicializarEscaner() {
            const html5QrcodeScanner = new Html5QrcodeScanner("lector-qr", { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true
            });
            
            html5QrcodeScanner.render(onScanSuccess);
        }

        // FUNCIÓN DE ESCANEO CORREGIDA Y CIERRES PERFECTOS
        function onScanSuccess(decodedText) {
            if (escaneoBloqueado) return;
            escaneoBloqueado = true; 

            const cuadroResultados = document.getElementById('resultado');
            cuadroResultados.style.display = "block";
            cuadroResultados.className = "exito"; 
            cuadroResultados.innerHTML = "✅ ¡REGISTRO ENVIADO!<br><small>DNI: " + decodedText + "</small>";
            document.body.style.backgroundColor = "#d1fae5";

            // Enviar datos en segundo plano
            fetch(urlGoogleSheets, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ codigo: decodedText })
            }).catch(error => console.log("Error de red:", error));

            // Pitido instantáneo estilo supermercado
            emitirPitido(800, 0.12);

            // Liberar la cámara en 800 milisegundos para modo ráfaga
            setTimeout(() => {
                cuadroResultados.style.display = "none";
                document.body.style.backgroundColor = "#f3f4f6";
                escaneoBloqueado = false; 
            }, 800);
        }

        // Forzar arranque limpio al cargar la página
        window.onload = inicializarEscaner;
    </script>
</body>
</html>
